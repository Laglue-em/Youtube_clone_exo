<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position relative and absolute</title>
  </head>
  <style>
    body {
      height: 3000px;
      background-color: brown;
    }
    .cross-container {
      position: relative;
    }
    .cross {
      position: absolute;
      font-family: roboto;
      background-color: rgb(12, 12, 12);
      width: 45px;
      height: 45px;
      border-radius: 25px;
      top: 10px;
      right: 13px;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="cross-container">
      <div class="cross">x</div>
    </div>
  </body>
</html>
