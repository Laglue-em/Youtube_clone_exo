<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up form</title>
  </head>
  <style>
    .first {
      display: inline-block;
      width: 145px;
      font-size: 16px;
      padding-left: 10px;
      padding-right: 5px;
      padding-top: 10px;
      padding-bottom: 10px;
      border-radius: 5px;
      border: 2px solid;
      border-color: rgb(180, 180, 180);
    }
    .surname {
      width: 145px;
      font-size: 16px;
      padding-left: 10px;
      padding-right: 5px;
      padding-top: 10px;
      padding-bottom: 10px;
      border-radius: 5px;
      border: 2px solid;
      border-color: rgb(180, 180, 180);
    }
    .email {
      font-size: 16px;
      display: block;
      margin-top: 10px;
      width: 318px;
      padding-left: 5px;
      padding-right: 5px;
      padding-top: 10px;
      padding-bottom: 10px;
      border-radius: 5px;
      border: 2px solid;
      border-color: rgb(180, 180, 180);
    }
    .sign-button {
      background-color: rgb(54, 93, 210);
      font-family: Helvetica;
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-top: 10px;
      margin-left: 5px;
      width: 325px;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 12px;
      padding-bottom: 12px;
      border: none;
      border-radius: 5px;
    }
  </style>
  <body>
    <input class="first" type="text" placeholder="First name" />
    <input class="surname" type="text" placeholder="Surname" />
    <input class="email" type="text" placeholder="Email" />
    <button class="sign-button">Sign Up</button>
  </body>
</html>
