<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tweet clone</title>
  </head>
  <style>
    .container {
      display: flex;
      align-items: center;
      box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.532);
      border-radius: 5px;
    }
    img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      object-position: center;
      border-radius: 40px;
      margin-left: 10px;
      margin-right: 10px;
    }
    p {
      font-family: Arial;
      font-size: 18px;
      color: grey;
      margin-right: 100px;
    }
    button {
      background-color: rgb(48, 139, 250);
      color: white;
      font-weight: 900;
      border: none;
      width: 70px;
      height: 35px;
      text-align: center;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="container">
      <img src="hamster-cute.png" alt="cute hamster" />
      <p>What's happening?</p>
      <button>Tweet</button>
    </div>
  </body>
</html>
