<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>twitter dog</title>
  </head>
  <style>
    p {
      font-family: Arial;
      margin-top: 0;
      margin-bottom: 8px;
      margin-left: 0;
    }
    .container {
      display: flex;
      flex-direction: row;
      align-items: center;
      margin-bottom: 5px;
    }
    img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 40px;
      margin-right: 20px;
    }

    button {
      background-color: rgb(29, 155, 240);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: bold;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 15px;
      padding-right: 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    .user-name {
      width: 200px;
      margin-bottom: 0;
    }
  </style>

  <body>
    <div class="container">
      <div>
        <img src="hamster-cute.png" alt="cute hamster" />
      </div>
      <div class="user-name">
        <p style="font-weight: 900">Oliver</p>
        <p style="color: grey; font-size: 17px">The manager</p>
        <p style="color: grey">Popular</p>
      </div>
      <div>
        <button>Follow</button>
      </div>
    </div>

    <div class="container">
      <div>
        <img src="cat-cute.jpg" alt="cute cat" />
      </div>
      <div class="user-name">
        <p style="font-weight: 900">Hector</p>
        <p style="color: grey; font-size: 17px">The cat</p>
        <p style="color: grey">Popular</p>
      </div>
      <div>
        <button>Follow</button>
      </div>
    </div>

    <div class="container">
      <div>
        <img src="cockie-dog.jpg" alt="cute dog" />
      </div>
      <div class="user-name">
        <p style="font-weight: 900">Marta</p>
        <p style="color: grey; font-size: 17px">The boss</p>
        <p style="color: grey">Popular</p>
      </div>
      <div>
        <button>Follow</button>
      </div>
    </div>
  </body>
</html>
