<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display block "google search bar" lesson 8</title>
  </head>
  <style>
    .name,
    .mail {
      display: block;
      margin-bottom: 5px;
    }
    p {
      width: 300px;
      display: inline-block;
      vertical-align: middle;
    }
    .yes-button,
    .no-button {
      display: inline-block;
    }
    .google {
      display: block;
      margin-left: 500px;
      width: 300px;
    }
    .shadow-box {
      font-size: 17px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      padding-right: 15px;
      width: 500px;
      margin-top: 10px;
      border-radius: 30px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
      margin-left: 400px;
      border: none;
      cursor: pointer;
    }
  </style>
  <body>
    <input class="name" type="text" placeholder="Name" />
    <input class="mail" type="text" placeholder="Email" />
    <p>
      Thanks for chatting with our customer support. Would you like to take our
      quick survey?
    </p>
    <button class="yes-button">Yes</button>
    <button class="no-button">No</button>
    <img class="google" src="google's logo.png" alt="google logo" />
    <input
      class="shadow-box"
      type="text"
      placeholder="Search Google or type a URL"
    />
  </body>
</html>
