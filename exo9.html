<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Textbox exo</title>
  </head>
  <style>
    .round-box {
      border-radius: 5px;
      border: 2px solid;
      border-color: lightgrey;
      font-size: 20px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      padding-right: 15px;
      cursor: pointer;
    }
    .shadow-box {
      font-size: 17px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      padding-right: 15px;
      width: 500px;
      margin-top: 10px;
      border-radius: 30px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
      border: none;
      cursor: pointer;
    }
  </style>
  <body>
    <input class="round-box" type="text" placeholder="Search" />
    <input
      class="shadow-box"
      type="text"
      placeholder="Search Google or type a URL"
    />
  </body>
</html>
