<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .grid {
      display: grid;
      grid-template-columns: 200px 75px;
    }
    .alice {
      background-color: mediumslateblue;
    }
    .violet {
      background-color: aqua;
    }
  </style>
  <body>
    <div class="grid">
      <div class="alice">200px</div>
      <div class="violet">75px</div>
    </div>

    <div style="display: grid; grid-template-columns: 200px 75px">
      <div style="background-color: blue">200px</div>
      <div style="background-color: coral">75px</div>
    </div>

    <div style="display: grid; grid-template-columns: 50px 1fr 75px">
      <div style="background-color: lightblue">col1</div>
      <div style="background-color: lightcoral">col2</div>
      <div style="background-color: lightblue">col3</div>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        column-gap: 20px;
        row-gap: 10px;
      "
    >
      <div style="background-color: royalblue">col1</div>
      <div style="background-color: royalblue">col2</div>
      <div style="background-color: royalblue">col3</div>
      <div style="background-color: royalblue">col4</div>
      <div style="background-color: royalblue">col1</div>
      <div style="background-color: royalblue">col2</div>
      <div style="background-color: royalblue">col3</div>
      <div style="background-color: royalblue">col4</div>
    </div>
  </body>
</html>
