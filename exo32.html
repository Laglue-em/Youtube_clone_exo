<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FACEBOOK HEAD</title>
  </head>
  <body>
    <style>
      body {
        font-family: Arial;
      }
      .headbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 50px;
        padding-right: 50px;
      }

      .profile-picture {
        width: 60px;
        height: 60px;
        object-fit: cover;
        object-position: center;
        border-radius: 30px;
        margin-right: 10px;
      }

      .left-section {
        display: flex;
        align-items: center;
      }

      .profile-picture {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 20px;
        margin-right: 10px;
      }

      .name {
        font-weight: 600;
        font-family: Arial;
      }

      .add-friend-button {
        background-color: rgb(30, 124, 246);
        color: white;
        font-weight: 550;
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 12px;
        padding-right: 12px;
        border-radius: 6px;
        margin-right: 3px;
        cursor: pointer;
      }

      .message-button {
        background-color: rgb(230, 230, 230);
        border: none;
        font-weight: 550;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 12px;
        padding-right: 12px;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
    <div class="headbar">
      <div class="left-section">
        <img
          class="profile-picture"
          src="hamster-cute.png"
          alt="Cute hamster"
        />
        <div class="name">Oliver, The guinea pig</div>
      </div>
      <div class="right-section">
        <button class="add-friend-button">Add Friend</button>
        <button class="message-button">Message</button>
      </div>
    </div>
  </body>
</html>
