<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uber Ride Clone</title>
  </head>
  <style>
    .text {
      font-family: Arial;
      font-weight: 500;
      font-size: 40px;
      margin-bottom: 30px;
    }
    .pickup {
      font-family: Arial;
      display: block;
      font-size: 15px;
      background-color: rgb(212, 212, 212);
      border: none;
      width: 400px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      margin-bottom: 8px;
    }
    .destination {
      font-family: Arial;
      display: block;
      font-size: 15px;
      background-color: rgb(212, 212, 212);
      border: none;
      width: 400px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      margin-bottom: 30px;
    }
    .request {
      font-family: Arial;
      display: inline-block;
      font-size: 15px;
      background-color: black;
      color: white;
      border: none;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      padding-right: 15px;
      margin-right: 10px;
      cursor: pointer;
    }
    .shedule {
      font-family: Arial;
      font-size: 15px;
      background-color: rgb(212, 212, 212);
      border: none;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      padding-right: 15px;
      cursor: pointer;
    }
  </style>
  <body>
    <p class="text">Request a ride now</p>
    <input class="pickup" type="text" placeholder="Enter pickup location" />
    <input class="destination" type="text" placeholder="Enter destination" />
    <button class="request">Resquest now</button>
    <button class="shedule">Shedule for later</button>
  </body>
</html>
