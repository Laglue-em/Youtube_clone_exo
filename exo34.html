<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exo position</title>
  </head>
  <style>
    .clothing-container {
      position: relative;
      display: inline-block;
    }
    .piece-of-cloth {
      width: 500px;
      height: 500px;
      object-fit: cover;
    }
    .promo {
      position: absolute;
      right: 0px;
      top: 10px;
      background-color: black;
      color: white;
      font-family: Arial;
      padding-top: 8px;
      padding-bottom: 8px;
      padding-left: 12px;
      padding-right: 12px;
    }
  </style>
  <body>
    <div>
      <div class="clothing-container">
        <img class="piece-of-cloth" src="sac-exercice.png" alt="" />
        <div class="promo">20% OFF</div>
      </div>
    </div>
  </body>
</html>
