<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox example</title>
  </head>
  <style>
    .container {
      font-family: arial;
      width: 450px;
      height: 150px;
      border-style: solid;
      border-width: 1px;
      border-color: rgb(231, 231, 231);

      border-radius: 10px;
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .flexbox {
      display: flex;
      flex-direction: row;
      font-size: 23px;
      justify-content: space-between;
    }
    .notify {
      font-size: 20px;
      background-color: rgb(63, 113, 232);
      color: white;
      font-weight: 700;
      margin-bottom: 20px;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 6px;
      padding-bottom: 6px;
      border-radius: 18px;
    }
  </style>

  <body>
    <div class="container">
      <div class="flexbox">
        <div>Home</div>
        <div class="notify">14</div>
      </div>

      <div class="flexbox">
        <div>Notifications</div>
        <div class="notify">3</div>
      </div>

      <div class="flexbox">
        <div>Messages</div>
        <div class="notify">5</div>
      </div>
    </div>
  </body>
</html>
