<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purple Search bar</title>
  </head>
  <style>
    p {
      margin-left: 10px;
      font-weight: bold;
      font-size: 15px;
      margin-right: 30px;
    }
    .container {
      display: flex;
      flex-direction: row;
      background-color: rgb(138, 98, 198);
      color: white;
      justify-content: space-between;
      font-family: arial;
      height: 50px;
      align-items: center;
    }
    .search-bar {
      max-width: 500px;
      border-radius: 15px;
      border: none;
      text-align: left;
      padding-left: 10px;
      height: 23px;
      flex: 2;
    }
    .download-button {
      color: white;
      border: solid;
      background-color: rgb(138, 98, 198);
      border-width: 1px;
      margin-left: 30px;
      margin-right: 10px;
      padding-top: 8px;
      padding-left: 15px;
      padding-bottom: 8px;
      padding-right: 15px;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="container">
      <p>Home</p>
      <input class="search-bar" type="text" placeholder="Search" />
      <button class="download-button">Download</button>
    </div>
  </body>
</html>
