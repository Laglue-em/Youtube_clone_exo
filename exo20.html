<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOOGLE SEARCH BAR CLONE</title>
  </head>
  <style>
    div {
      text-align: center;
    }

    .shadow-box {
      font-size: 17px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 15px;
      padding-right: 15px;
      width: 500px;
      margin-top: 10px;
      border-radius: 30px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
      border: none;
      cursor: pointer;
    }
    button {
      background-color: rgb(245, 245, 245);
      color: rgb(0, 0, 0);
      border: none;
      font-size: 15px;
      padding-top: 12px;
      padding-bottom: 12px;
      padding-left: 20px;
      padding-right: 20px;
      margin-right: 8px;
      margin-top: 30px;
      cursor: pointer;
    }
  </style>
  <body>
    <div>
      <img class="image-google" src="google's logo.png" alt="logo Google" />
    </div>
    <div>
      <input
        class="shadow-box"
        type="text"
        placeholder="Search Google or type a URL"
      />
    </div>
    <div>
      <button class="google-button">Google Search</button>
      <button class="lucky-button">I'm Feeling Lucky</button>
    </div>
  </body>
</html>
