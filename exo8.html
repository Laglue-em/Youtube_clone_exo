<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exo image 1</title>
  </head>
  <style>
    .hamster {
      width: 200px;
      border-radius: 50px;
    }
    .hamster-center {
      width: 200px;
      height: 200px;
      object-fit: cover;
      object-position: center;
    }
    .hamster-round {
      width: 200px;
      height: 200px;
      border-radius: 100px;
      object-fit: cover;
      object-position: center;
    }
  </style>
  <body>
    <img class="hamster" src="hamster-cute.png" alt="Cute hamster" />
    <img
      class="hamster-center"
      src="hamster-cute.png"
      alt="Cute hamster center"
    />
    <img
      class="hamster-round"
      src="hamster-cute.png"
      alt="hamster round image"
    />
  </body>
</html>
