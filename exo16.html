<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RED SQUARE/GREEN SPHERE</title>
  </head>
  <style>
    .red-square {
      background-color: red;
      width: 100px;
      height: 100px;
      margin-bottom: 10px;
    }
    .green-round {
      background-color: green;
      width: 100px;
      height: 100px;
      border-radius: 50px;
    }
  </style>
  <body>
    <div class="red-square"></div>
    <div class="green-round"></div>
  </body>
</html>
